openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Student Grievance Redressal System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: complaints
    description: Complaint management
  - name: notifications
    description: Notification management
  - name: responses
    description: Complaint responses
  - name: feedback
    description: Feedback management
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: registerStudent
      tags: [auth]
      summary: Register a new student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Student registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login user (student, admin, or department)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /complaints:
    get:
      operationId: listComplaints
      tags: [complaints]
      summary: List complaints (filtered by role)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: department
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of complaints
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplaintListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createComplaint
      tags: [complaints]
      summary: Submit a new complaint
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateComplaintRequest"
      responses:
        "201":
          description: Complaint created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /complaints/{id}:
    get:
      operationId: getComplaint
      tags: [complaints]
      summary: Get a specific complaint
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Complaint details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplaintDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateComplaint
      tags: [complaints]
      summary: Update complaint status or department (admin/department)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateComplaintRequest"
      responses:
        "200":
          description: Updated complaint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /complaints/{id}/responses:
    get:
      operationId: getComplaintResponses
      tags: [responses]
      summary: Get responses for a complaint
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of responses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseListResponse"
    post:
      operationId: addComplaintResponse
      tags: [responses]
      summary: Add a response to a complaint
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddResponseRequest"
      responses:
        "201":
          description: Response added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplaintResponse"

  /complaints/{id}/feedback:
    post:
      operationId: submitFeedback
      tags: [feedback]
      summary: Submit feedback for a resolved complaint
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackRequest"
      responses:
        "201":
          description: Feedback submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feedback"
    get:
      operationId: getComplaintFeedback
      tags: [feedback]
      summary: Get feedback for a complaint
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Feedback details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feedback"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: Get notifications for the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/mark-all-read:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All notifications marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/analytics:
    get:
      operationId: getAnalytics
      tags: [admin]
      summary: Get complaint analytics (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
      required:
        - name
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [student, admin, department]
      required:
        - email
        - password
        - role

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserInfo"
      required:
        - token
        - user

    UserInfo:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
      required:
        - id
        - name
        - email
        - role

    CreateComplaintRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [Academics, Facilities, Hostel, Faculty, Administration, Others]
      required:
        - title
        - description
        - category

    UpdateComplaintRequest:
      type: object
      properties:
        status:
          type: string
          enum: [Pending, In Review, In Progress, Resolved]
        department:
          type: string
          enum: [Academics, Facilities, Hostel, Faculty, Administration, Others]

    Complaint:
      type: object
      properties:
        id:
          type: integer
        studentId:
          type: integer
        studentName:
          type: string
        title:
          type: string
        description:
          type: string
        category:
          type: string
        department:
          type: string
          nullable: true
        status:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - studentId
        - title
        - description
        - category
        - status
        - createdAt

    ComplaintDetail:
      allOf:
        - $ref: "#/components/schemas/Complaint"
        - type: object
          properties:
            responses:
              type: array
              items:
                $ref: "#/components/schemas/ComplaintResponse"
            feedback:
              $ref: "#/components/schemas/Feedback"
              nullable: true

    ComplaintListResponse:
      type: object
      properties:
        complaints:
          type: array
          items:
            $ref: "#/components/schemas/Complaint"
        total:
          type: integer
      required:
        - complaints
        - total

    AddResponseRequest:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    ComplaintResponse:
      type: object
      properties:
        id:
          type: integer
        complaintId:
          type: integer
        staffId:
          type: integer
        staffName:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - complaintId
        - staffId
        - message
        - createdAt

    ResponseListResponse:
      type: object
      properties:
        responses:
          type: array
          items:
            $ref: "#/components/schemas/ComplaintResponse"
      required:
        - responses

    FeedbackRequest:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
      required:
        - rating

    Feedback:
      type: object
      properties:
        id:
          type: integer
        complaintId:
          type: integer
        rating:
          type: integer
        comment:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - complaintId
        - rating
        - createdAt

    Notification:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        complaintId:
          type: integer
          nullable: true
        message:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - message
        - isRead
        - createdAt

    NotificationListResponse:
      type: object
      properties:
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        unreadCount:
          type: integer
      required:
        - notifications
        - unreadCount

    AnalyticsResponse:
      type: object
      properties:
        totalComplaints:
          type: integer
        pendingCount:
          type: integer
        inReviewCount:
          type: integer
        inProgressCount:
          type: integer
        resolvedCount:
          type: integer
        byCategory:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
        byDepartment:
          type: array
          items:
            $ref: "#/components/schemas/DepartmentCount"
      required:
        - totalComplaints
        - pendingCount
        - inReviewCount
        - inProgressCount
        - resolvedCount
        - byCategory
        - byDepartment

    CategoryCount:
      type: object
      properties:
        category:
          type: string
        count:
          type: integer
      required:
        - category
        - count

    DepartmentCount:
      type: object
      properties:
        department:
          type: string
        count:
          type: integer
      required:
        - department
        - count
