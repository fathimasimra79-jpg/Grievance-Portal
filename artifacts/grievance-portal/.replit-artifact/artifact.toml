kind = "web"
previewPath = "/"
title = "University Grievance Portal"
version = "1.0.0"
id = "artifacts/grievance-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21715
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/grievance-portal run dev"

[services.env]
PORT = "21715"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/grievance-portal", "run", "build"]
publicDir = "artifacts/grievance-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
